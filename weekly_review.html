{% extends "base.html" %}

{% block content %}
<div class="weekly-review">
    <h2>📝 Weekly Review</h2>

    <div class="review-stats">
        <div class="stat-card">
            <div class="stat-card-accent" style="background: linear-gradient(#6366F1, #8B5CF6);"></div>
            <div class="stat-label">🔢 Trades This Week</div>
            <div class="stat-value-large">{{ stats.total_trades }}</div>
        </div>
        <div class="stat-card">
            <div class="stat-card-accent" style="background: {{ 'linear-gradient(#10B981,#34D399)' if stats.net_points >= 0 else 'linear-gradient(#EF4444,#F87171)' }};"></div>
            <div class="stat-label">📐 Net Points</div>
            <div class="stat-value-large {{ 'positive' if stats.net_points > 0 else 'negative' }}">
                {{ stats.net_points }}
            </div>
        </div>
        <div class="stat-card">
            <div class="stat-card-accent" style="background: linear-gradient(#0EA5E9, #06B6D4);"></div>
            <div class="stat-label">🎯 Win Rate</div>
            <div class="stat-value-large">{{ stats.win_rate }}%</div>
        </div>
    </div>

    <div class="review-form">
        <h3>🪞 Weekly Reflection</h3>
        <form method="POST">
            <div class="form-group">
                <label>🏆 Best Trade This Week — Why?  *</label>
                <textarea name="best_trade_reason" rows="3" required placeholder="Describe what went right and why this was your best trade..."></textarea>
            </div>

            <div class="form-group">
                <label>❌ Worst Trade This Week — Why?  *</label>
                <textarea name="worst_trade_reason" rows="3" required placeholder="What went wrong? Be honest with yourself..."></textarea>
            </div>

            <div class="form-group">
                <label>⚠️ Main Mistake This Week  *</label>
                <textarea name="main_mistake" rows="3" required placeholder="What was your biggest mistake this week?"></textarea>
            </div>

            <div class="form-group">
                <label>🎯 Next Week Focus Rule (ONE specific rule)  *</label>
                <textarea name="next_week_focus" rows="3" required
                    placeholder="Example: I will not trade if I miss the 9:30 candle"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn-primary btn-large">💾 Save Weekly Review</button>
                <a href="{{ url_for('dashboard') }}" class="btn-secondary btn-large">← Back</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
