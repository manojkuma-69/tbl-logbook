<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — TBL_logbook</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-logo">
            <span class="icon">📈</span>
            <h1>TBL_logbook</h1>
        </div>
        <h2>Professional Trading Journal</h2>

        {% if error %}
        <div class="error-message">⚠️ {{ error }}</div>
        {% endif %}

        <form method="POST" class="login-form">
            <div class="form-group">
                <label>📧 Email</label>
                <input type="email" name="email" required autofocus placeholder="trader@tbl.com">
            </div>

            <div class="form-group">
                <label>🔒 Password</label>
                <input type="password" name="password" required placeholder="Enter your password">
            </div>

            <button type="submit" class="btn-primary">🔑 Sign In</button>
        </form>

        <div class="login-note">
            Default: <a href="/cdn-cgi/l/email-protection" class="__cf_email__" data-cfema
